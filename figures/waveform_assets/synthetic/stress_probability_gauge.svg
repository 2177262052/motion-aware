<svg xmlns="http://www.w3.org/2000/svg" width="220" height="130" viewBox="0 0 220 130">
  <rect width="220" height="130" fill="none"/>

  <!-- Colored risk bands -->
  <path d="M 45 95 A 65 65 0 0 1 79 38"
        fill="none" stroke="#4CAF50" stroke-width="18" stroke-linecap="butt"/>
  <path d="M 79 38 A 65 65 0 0 1 141 38"
        fill="none" stroke="#F5B32F" stroke-width="18" stroke-linecap="butt"/>
  <path d="M 141 38 A 65 65 0 0 1 175 95"
        fill="none" stroke="#E53935" stroke-width="18" stroke-linecap="butt"/>

  <!-- Thin white separators -->
  <path d="M 78 38 L 87 55" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M 142 38 L 133 55" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Needle. Rotate around (110,95) to change stress probability. Current angle: about 35 degrees toward red. -->
  <g transform="rotate(35 110 95)">
    <line x1="110" y1="95" x2="110" y2="45"
          stroke="#111827" stroke-width="7" stroke-linecap="round"/>
    <polygon points="110,36 104,52 116,52" fill="#111827"/>
  </g>

  <!-- Center cap -->
  <circle cx="110" cy="95" r="11" fill="#111827"/>
  <circle cx="110" cy="95" r="5" fill="#FFFFFF" opacity="0.9"/>
</svg>
